name: Validar exclusão de categoria

on:
  push:
    branches: [main]
    paths:
      - "blog/_categories/**.md"

concurrency:
  group: validate-category
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - run: npm install

      - run: node scripts/validate-category.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: restaura categoria em uso por posts existentes [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
