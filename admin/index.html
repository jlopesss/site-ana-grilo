<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin | Ana Grilo</title>
  <link rel="icon" href="/img/favicon/favicon.ico" sizes="any">
  <link rel="icon" href="/img/favicon/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/favicon/favicon-180.png">
  <style>
    /*
     * Paleta do site:
     * Light — bg:#F4EFE7  surface:#FDFAF5  text:#1C2B20  muted:#5A7A66  border:#D5CFC8  primary:#2E7D52
     * Dark  — bg:#1a1a2c  card:#242438     text:#e0e0f0  muted:#8888a8  border:#2d2d45  accent:#5599ff
     *
     * Estratégia dark mode: reseta todos os backgrounds via `html.dark *` (vence o styled-components
     * do Decap CMS pois usa !important), depois re-aplica cores específicas com seletores mais
     * específicos (header, li, button, input, etc.).
     */

    html.dark { color-scheme: dark; }

    /* Reset universal — remove backgrounds gerados pelo styled-components */
    html.dark * {
      background-color: transparent !important;
      color: inherit !important;
    }

    /* Body: superfície principal */
    html.dark body {
      background: #1a1a2c !important;
      color: #e0e0f0 !important;
    }

    /* Barra de navegação superior */
    html.dark header {
      background-color: #0e0e1c !important;
    }

    /* Cards da listagem de posts */
    html.dark li {
      background-color: #242438 !important;
    }

    /* Links */
    html.dark a {
      color: #5599ff !important;
    }

    /* Botões do CMS */
    html.dark button:not(#admin-theme-btn) {
      background-color: #242438 !important;
      color: #e0e0f0 !important;
    }

    /* Formulários nativos */
    html.dark input:not([type="file"]),
    html.dark textarea,
    html.dark select {
      background: #242438 !important;
      color: #e0e0f0 !important;
      border: 1px solid #3d3d58 !important;
    }

    /* Editor rich-text */
    html.dark [contenteditable] {
      background: #1a1a2c !important;
      color: #e0e0f0 !important;
      caret-color: #5599ff !important;
    }

    /* Editor markdown: CodeMirror 5 */
    html.dark .CodeMirror {
      background: #1a1a2c !important;
      color: #e0e0f0 !important;
    }
    html.dark .CodeMirror-scroll { background: #1a1a2c !important; }
    html.dark .CodeMirror-gutters {
      background: #0e0e1c !important;
      border-right: 1px solid #2d2d45 !important;
    }
    html.dark .CodeMirror-linenumber { color: #8888a8 !important; }
    html.dark .CodeMirror-cursor    { border-left-color: #5599ff !important; }
    html.dark .CodeMirror-activeline-background { background: rgba(85,153,255,0.07) !important; }
    html.dark .CodeMirror-selected  { background: rgba(85,153,255,0.18) !important; }

    /* Toolbar do editor */
    html.dark [role="toolbar"] {
      background: #0e0e1c !important;
      border-color: #2d2d45 !important;
    }
    html.dark [role="toolbar"] button {
      color: #8888a8 !important;
      background-color: transparent !important;
    }
    html.dark [role="toolbar"] button:hover {
      background: rgba(85,153,255,0.1) !important;
      color: #e0e0f0 !important;
    }

    /* ── Botão flutuante de tema ── */
    #admin-theme-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 99999;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.05rem;
      border-radius: 100px;
      border: 1px solid #D5CFC8;
      background: #FDFAF5;
      color: #5A7A66;
      font-size: 0.78rem;
      font-family: system-ui, sans-serif;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(15,61,37,0.12);
      transition: border-color 0.2s, color 0.2s, background 0.25s, box-shadow 0.2s;
      letter-spacing: 0.03em;
      user-select: none;
    }
    #admin-theme-btn:hover {
      border-color: #2E7D52;
      color: #2E7D52;
    }

    html.dark #admin-theme-btn {
      background: #1e1e30 !important;
      border-color: #2d2d45 !important;
      color: #8888a8 !important;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }
    html.dark #admin-theme-btn:hover {
      border-color: #5599ff !important;
      color: #5599ff !important;
    }
  </style>
</head>
<body>
  <!-- Toggle de tema na página admin -->
  <button id="admin-theme-btn" title="Alternar tema">☾ Escuro</button>
  <script>
    (function() {
      var btn  = document.getElementById('admin-theme-btn');
      var html = document.documentElement;
      var dark = localStorage.getItem('admin-theme') !== 'light';

      function apply(d) {
        html.classList.toggle('dark', d);
        btn.textContent = d ? '☀ Claro' : '☾ Escuro';
      }

      apply(dark);

      btn.addEventListener('click', function() {
        dark = !dark;
        localStorage.setItem('admin-theme', dark ? 'dark' : 'light');
        apply(dark);
      });
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── Preview: paleta dark do site (#1A2B1D / verde-floresta) ──
    CMS.registerPreviewStyle(`
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Outfit', sans-serif;
        background: #1A2B1D;
        color: #DFF0E7;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }

      .post-header {
        padding: 3.5rem 1.5rem 2rem;
        text-align: center;
        border-bottom: 1px solid #263D2E;
      }

      .post-tag {
        display: inline-block;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #72C99A;
        background: rgba(114,201,154,0.12);
        border: 1px solid rgba(114,201,154,0.22);
        padding: 0.28rem 0.75rem;
        border-radius: 100px;
        margin-bottom: 1.25rem;
      }

      .post-title {
        font-size: clamp(1.6rem, 4vw, 2.3rem);
        font-weight: 700;
        line-height: 1.22;
        max-width: 740px;
        margin: 0 auto 0.9rem;
        color: #C8EDD8;
        letter-spacing: -0.01em;
      }

      .preview-desc {
        font-size: 1rem;
        line-height: 1.65;
        color: #8FBDA3;
        max-width: 640px;
        margin: 0 auto 1.25rem;
        font-style: italic;
      }

      .post-meta {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.8rem;
        color: #8FBDA3;
        letter-spacing: 0.03em;
      }

      .post-hero-img {
        max-width: 860px;
        margin: 2rem auto 0;
        border-radius: 10px;
        overflow: hidden;
        line-height: 0;
        border: 1px solid #263D2E;
      }
      .post-hero-img img { width: 100%; height: auto; display: block; }

      .post-body {
        max-width: 760px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 5rem;
      }

      .post-body p {
        font-size: 1.05rem;
        line-height: 1.85;
        margin-bottom: 1.5rem;
        color: #C8DDD3;
      }

      .post-body h2 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 2.75rem 0 0.85rem;
        line-height: 1.25;
        color: #C8EDD8;
        letter-spacing: -0.01em;
        padding-top: 0.5rem;
        border-top: 1px solid #263D2E;
      }

      .post-body h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 1.75rem 0 0.6rem;
        color: #DFF0E7;
      }

      .post-body ul, .post-body ol { margin: 0 0 1.5rem 1.25rem; padding: 0; }
      .post-body li  { font-size: 1.05rem; line-height: 1.8; margin-bottom: 0.45rem; color: #C8DDD3; }
      .post-body strong { font-weight: 700; color: #DFF0E7; }
      .post-body em     { font-style: italic; color: #8FBDA3; }
      .post-body a      { color: #72C99A; text-decoration: none; border-bottom: 1px solid rgba(114,201,154,0.3); }

      .post-body blockquote {
        border-left: 3px solid #72C99A;
        margin: 2.25rem 0;
        padding: 1.1rem 1.5rem;
        background: rgba(114,201,154,0.07);
        border-radius: 0 10px 10px 0;
        font-size: 1.05rem;
        font-style: italic;
        line-height: 1.75;
        color: #A8CCB8;
      }

      .post-body hr { border: none; border-top: 1px solid #263D2E; margin: 3rem 0; }

      .post-cta-inline {
        text-align: center;
        margin: 2.5rem 0;
        padding: 2rem 1.5rem;
        background: rgba(114,201,154,0.07);
        border: 1px solid rgba(114,201,154,0.18);
        border-radius: 14px;
      }
      .post-cta-inline p { margin-bottom: 1.25rem; font-size: 1.05rem; font-style: italic; color: #8FBDA3; }
      .cta-btn {
        display: inline-block;
        background: #2E7D52;
        color: #DFF0E7;
        padding: 0.8rem 1.85rem;
        border-radius: 100px;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        letter-spacing: 0.01em;
      }
    `, { raw: true });

    // h e createClass são globais expostos pelo bundle UMD do decap-cms.js
    var PostPreview = createClass({
      render: function() {
        var entry = this.props.entry;

        var title = entry.getIn(['data', 'title'])       || '';
        var desc  = entry.getIn(['data', 'description']) || '';
        var cat   = entry.getIn(['data', 'category'])    || '';
        var cta   = entry.getIn(['data', 'cta_texto'])   || '';
        var date  = entry.getIn(['data', 'date'])        || '';
        var image = entry.getIn(['data', 'image'])       || '';
        var rawMd = entry.getIn(['data', 'body'])        || '';

        var cleanMd = rawMd.replace(/\\([#>\-\*_\[\]!`~])/g, '$1');

        var ctaHtml = cta
          ? '<div class="post-cta-inline"><p>' + cta + '</p><span class="cta-btn">Falar com Ana Grilo pelo WhatsApp</span></div>'
          : '';
        if (ctaHtml) {
          cleanMd = cleanMd.replace(/^---cta---$/m, '\n\n' + ctaHtml + '\n\n');
        }

        var bodyHtml = window.marked ? window.marked.parse(cleanMd) : '<p>' + cleanMd + '</p>';

        var displayDate = '';
        if (date) {
          try {
            displayDate = new Date(date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
          } catch(e) {}
        }

        return h('div', {},
          h('header', { className: 'post-header' },
            cat   ? h('span', { className: 'post-tag' }, cat) : null,
            title ? h('h1',  { className: 'post-title' }, title) : null,
            desc  ? h('p',   { className: 'preview-desc' }, desc) : null,
            h('div', { className: 'post-meta' },
              displayDate ? h('time', {}, displayDate) : null
            ),
            image ? h('figure', { className: 'post-hero-img' },
              h('img', { src: image, alt: title, style: { width: '100%', height: 'auto' } })
            ) : null
          ),
          h('div', {
            className: 'post-body',
            dangerouslySetInnerHTML: { __html: bodyHtml }
          })
        );
      }
    });

    CMS.registerPreviewTemplate('posts', PostPreview);
  </script>
</body>
</html>
