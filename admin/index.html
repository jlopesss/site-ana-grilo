<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin | Ana Grilo</title>
  <link rel="icon" href="/img/favicon/favicon.ico" sizes="any">
  <link rel="icon" href="/img/favicon/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/favicon/favicon-180.png">
  <style>
    /* ── Dark theme para a interface do Decap CMS ── */
    :root {
      --bg0: #0e1117;
      --bg1: #161b26;
      --bg2: #1d2333;
      --border: rgba(255,255,255,0.07);
      --text: #dde2ec;
      --text2: #8790a3;
      --green: #5cb87a;
      --green-dim: rgba(92,184,122,0.14);
    }

    html, body {
      background: var(--bg0) !important;
      color: var(--text) !important;
      margin: 0;
    }

    [class*="SidebarContainer"], [class*="Sidebar"], [class*="Nav"] {
      background: var(--bg1) !important;
      border-right: 1px solid var(--border) !important;
    }

    [class*="App__NavItemLabel"],
    [class*="AppHeader"],
    [class*="Toolbar"] {
      background: var(--bg1) !important;
      border-bottom: 1px solid var(--border) !important;
    }

    [class*="WorkflowContainer"],
    [class*="CollectionContainer"],
    [class*="EditorContainer"],
    [class*="MainView"] {
      background: var(--bg0) !important;
    }

    [class*="Card"] {
      background: var(--bg1) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
    }

    input, textarea, select, [class*="TextInput"], [class*="Select"] {
      background: var(--bg2) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }

    label, [class*="Label"] { color: var(--text2) !important; }

    [class*="PrimaryButton"], button[type="submit"] {
      background: var(--green) !important;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // ── CSS do preview com variáveis para tema dark/light ──
    CMS.registerPreviewStyle(`
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; }

      /* ── Tokens: dark (padrão) ── */
      :root {
        --bg:           #0e1117;
        --surface:      #161b26;
        --text:         #dde2ec;
        --text2:        #8790a3;
        --text3:        #c8cdd9;
        --title:        #eef0f5;
        --accent:       #5cb87a;
        --accent-dim:   rgba(92,184,122,0.12);
        --accent-bd:    rgba(92,184,122,0.20);
        --border:       rgba(255,255,255,0.06);
        --h2-border:    rgba(255,255,255,0.05);
        --quote-bg:     rgba(92,184,122,0.07);
        --quote-text:   #b8c4b0;
        --cta-bg:       rgba(92,184,122,0.07);
        --cta-bd:       rgba(92,184,122,0.18);
        --toggle-icon:  '☀';
      }

      /* ── Tokens: light ── */
      :root.light {
        --bg:           #fafaf9;
        --surface:      #f4f3f1;
        --text:         #2d2d2d;
        --text2:        #6b7280;
        --text3:        #374151;
        --title:        #111827;
        --accent:       #4A8C65;
        --accent-dim:   rgba(74,140,101,0.10);
        --accent-bd:    rgba(74,140,101,0.25);
        --border:       rgba(0,0,0,0.08);
        --h2-border:    rgba(0,0,0,0.06);
        --quote-bg:     rgba(74,140,101,0.06);
        --quote-text:   #374151;
        --cta-bg:       rgba(74,140,101,0.07);
        --cta-bd:       rgba(74,140,101,0.20);
        --toggle-icon:  '☾';
      }

      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding-top: 2.75rem;
        -webkit-font-smoothing: antialiased;
        transition: background 0.25s, color 0.25s;
      }

      /* ── Barra de tema (topo fixo do preview) ── */
      .theme-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 999;
        height: 2.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--text2);
        letter-spacing: 0.04em;
      }

      .theme-bar span { opacity: 0.6; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }

      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.3rem 0.75rem;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text2);
        font-size: 0.75rem;
        font-family: inherit;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
        letter-spacing: 0.03em;
      }
      .theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Header ── */
      .post-header {
        padding: 3.5rem 1.5rem 2rem;
        text-align: center;
        border-bottom: 1px solid var(--border);
      }

      .post-tag {
        display: inline-block;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-dim);
        border: 1px solid var(--accent-bd);
        padding: 0.28rem 0.75rem;
        border-radius: 100px;
        margin-bottom: 1.25rem;
      }

      .post-title {
        font-size: clamp(1.6rem, 4vw, 2.3rem);
        font-weight: 700;
        line-height: 1.22;
        max-width: 740px;
        margin: 0 auto 0.9rem;
        color: var(--title);
        letter-spacing: -0.01em;
      }

      .preview-desc {
        font-size: 1rem;
        line-height: 1.65;
        color: var(--text2);
        max-width: 640px;
        margin: 0 auto 1.25rem;
        font-style: italic;
      }

      .post-meta {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.8rem;
        color: var(--text2);
        letter-spacing: 0.03em;
      }

      /* ── Hero image ── */
      .post-hero-img {
        max-width: 860px;
        margin: 2rem auto 0;
        border-radius: 10px;
        overflow: hidden;
        line-height: 0;
        border: 1px solid var(--border);
      }
      .post-hero-img img { width: 100%; height: auto; display: block; }

      /* ── Corpo ── */
      .post-body {
        max-width: 760px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 5rem;
      }

      .post-body p {
        font-size: 1.05rem;
        line-height: 1.85;
        margin-bottom: 1.5rem;
        color: var(--text3);
      }

      .post-body h2 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 2.75rem 0 0.85rem;
        line-height: 1.25;
        color: var(--title);
        letter-spacing: -0.01em;
        padding-top: 0.5rem;
        border-top: 1px solid var(--h2-border);
      }

      .post-body h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 1.75rem 0 0.6rem;
        color: var(--text);
      }

      .post-body ul, .post-body ol {
        margin: 0 0 1.5rem 1.25rem;
        padding: 0;
      }

      .post-body li {
        font-size: 1.05rem;
        line-height: 1.8;
        margin-bottom: 0.45rem;
        color: var(--text3);
      }

      .post-body strong { font-weight: 700; color: var(--text); }
      .post-body em    { font-style: italic; color: var(--text2); }

      .post-body a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid var(--accent-bd);
      }

      .post-body blockquote {
        border-left: 3px solid var(--accent);
        margin: 2.25rem 0;
        padding: 1.1rem 1.5rem;
        background: var(--quote-bg);
        border-radius: 0 10px 10px 0;
        font-size: 1.05rem;
        font-style: italic;
        line-height: 1.75;
        color: var(--quote-text);
      }

      .post-body hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 3rem 0;
      }

      /* ── CTA ── */
      .post-cta-inline {
        text-align: center;
        margin: 2.5rem 0;
        padding: 2rem 1.5rem;
        background: var(--cta-bg);
        border: 1px solid var(--cta-bd);
        border-radius: 14px;
      }

      .post-cta-inline p {
        margin-bottom: 1.25rem;
        font-size: 1.05rem;
        font-style: italic;
        color: var(--text2);
      }

      .cta-btn {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        padding: 0.8rem 1.85rem;
        border-radius: 100px;
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        letter-spacing: 0.01em;
      }
    `, { raw: true });

    // ── Preview component com toggle de tema ──
    var PostPreview = createClass({
      getInitialState: function() {
        return { dark: true };
      },

      componentDidMount: function() {
        var saved = window.localStorage.getItem('preview-theme');
        var dark = saved !== 'light';
        this.setState({ dark: dark });
        document.documentElement.className = dark ? '' : 'light';
      },

      toggleTheme: function() {
        var dark = !this.state.dark;
        this.setState({ dark: dark });
        document.documentElement.className = dark ? '' : 'light';
        window.localStorage.setItem('preview-theme', dark ? 'dark' : 'light');
      },

      render: function() {
        var entry = this.props.entry;

        var title = entry.getIn(['data', 'title'])       || '';
        var desc  = entry.getIn(['data', 'description']) || '';
        var cat   = entry.getIn(['data', 'category'])    || '';
        var cta   = entry.getIn(['data', 'cta_texto'])   || '';
        var date  = entry.getIn(['data', 'date'])        || '';
        var image = entry.getIn(['data', 'image'])       || '';
        var rawMd = entry.getIn(['data', 'body'])        || '';
        var dark  = this.state.dark;

        var cleanMd = rawMd.replace(/\\([#>\-\*_\[\]!`~])/g, '$1');

        var ctaHtml = cta
          ? '<div class="post-cta-inline"><p>' + cta + '</p><span class="cta-btn">Falar com Ana Grilo pelo WhatsApp</span></div>'
          : '';
        if (ctaHtml) {
          cleanMd = cleanMd.replace(/^---cta---$/m, '\n\n' + ctaHtml + '\n\n');
        }

        var bodyHtml = window.marked ? window.marked.parse(cleanMd) : '<p>' + cleanMd + '</p>';

        var displayDate = '';
        if (date) {
          try {
            displayDate = new Date(date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
          } catch(e) {}
        }

        return h('div', {},
          h('div', { className: 'theme-bar' },
            h('span', {}, 'Preview'),
            h('button', {
              className: 'theme-toggle',
              title: dark ? 'Mudar para tema claro' : 'Mudar para tema escuro',
              onClick: this.toggleTheme
            },
              dark ? '☀' : '☾',
              ' ',
              dark ? 'Tema claro' : 'Tema escuro'
            )
          ),

          h('header', { className: 'post-header' },
            cat   ? h('span', { className: 'post-tag' }, cat) : null,
            title ? h('h1',  { className: 'post-title' }, title) : null,
            desc  ? h('p',   { className: 'preview-desc' }, desc) : null,
            h('div', { className: 'post-meta' },
              displayDate ? h('time', {}, displayDate) : null
            ),
            image ? h('figure', { className: 'post-hero-img' },
              h('img', { src: image, alt: title, style: { width: '100%', height: 'auto' } })
            ) : null
          ),

          h('div', {
            className: 'post-body',
            dangerouslySetInnerHTML: { __html: bodyHtml }
          })
        );
      }
    });

    CMS.registerPreviewTemplate('posts', PostPreview);
  </script>
</body>
</html>
